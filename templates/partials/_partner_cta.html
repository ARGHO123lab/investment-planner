{% if partners %}
<div style="margin-top:30px;">

  {% for key in partners %}

    {% if key in PARTNER_LINKS %}

      {% set p = PARTNER_LINKS[key] %}

      <div style="
          margin-top:15px;
          background-color:#F9F9F9;
          border:1px solid #EEEEEE;
          border-left:4px solid {{ p.color }};
          border-radius:10px;
          padding:20px;
      ">

        <p style="
            margin:0 0 10px 0;
            color:#555555;
            font-size:14px;
        ">
          {{ p.tagline }}
        </p>

        <a
          href="{{ p.url }}"
          target="_blank"
          rel="nofollow sponsored noopener"
          style="
              display:inline-block;
              background-color:{{ p.color }};
              color:#FFFFFF;
              padding:12px 24px;
              border-radius:10px;
              text-decoration:none;
              font-weight:600;
          "
        >
          {{ p.cta }}
        </a>

      </div>

    {% endif %}

  {% endfor %}

  <p style="
      margin-top:10px;
      font-size:11px;
      color:#999999;
  ">
    We may earn a commission if you sign up through the links above, at no extra cost to you.
  </p>

</div>
{% endif %}
