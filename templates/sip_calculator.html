<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SIP Calculator</title>

    <style>
        
    body {
        padding: 40px;
        background: #FFFDF5; /* Same background as Report */
        font-family: 'Poppins', sans-serif;
    }

    .container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,.08);
    }

    h1 { color: #B8860B; margin-bottom: 25px; } /* Same Gold/Yellow header */

    label { font-weight: 500; color: #555; display: block; margin-top: 15px; }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
    }

    button {
        
        border: none;
        
    width:100%;
    margin-top:15px;
    padding:15px;
    text-align:center;
    text-decoration:none;
    background:#FFC107;
    color:#222;
    font-size:18px;
    font-weight:600;
    border-radius:12px;
    transition:.3s;

    }

   .back-btn:hover{
    background:#FFB300;
}

    .result-box {
        margin-top: 30px;
        padding: 20px;
        background: #FFF8E1; /* Same Box color as Report */
        border-left: 5px solid #FFC107;
        border-radius: 12px;
        text-align: center;
    }
</style>
    
</head>

<body>

<div class="card">

    <h1>📊 SIP Calculator</h1>

    <form method="POST">

        <label>Monthly Investment</label>
        <input type="number" name="monthly_investment" required>

        <label>Expected Annual Return (%)</label>
        <input type="number" name="annual_return" required>

        <label>Time Period (Years)</label>
        <input type="number" name="years" required>

        <button type="submit">Calculate</button>

    </form>

   <div style="margin-top:20px;">
    <a href="{{ url_for('dashboard') }}" class="back-btn">
    ← Back to Dashboard
</a>
</div>

    {% if result %}
        <div class="result">
            Future Value: ₹ {{ result }}
        </div>
    {% endif %}

</div>

</body>

</html>
