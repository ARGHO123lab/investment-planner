<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Financial Profile | SmartPlan Finance</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PFM7XZ5E3P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PFM7XZ5E3P');
    </script>

    <style>

        body{

            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:40px;

        }

        .card{

            width:700px;
            padding:40px;

        }

        .step{

            color:#B8860B;
            font-weight:600;
            margin-bottom:10px;

        }

        h2{

            margin-bottom:10px;

        }

        .subtitle{

            color:#666;
            margin-bottom:30px;

        }

        .grid{

            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;

        }

        .field{

            display:flex;
            flex-direction:column;

        }

        label{

            margin-bottom:8px;
            font-weight:600;

        }

        .risk-title{

            margin-top:30px;
            margin-bottom:15px;
            font-weight:700;
            color:#B8860B;

        }

        .risk-options{

            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:18px;

        }

        .risk-card{

            border:2px solid #EEE;
            border-radius:15px;
            padding:20px;
            cursor:pointer;
            transition:.30s;
            text-align:center;
            background:white;

        }

        .risk-card:hover{

            border-color:#FFC107;
            transform:translateY(-5px);

        }

        .risk-card input{

            display:none;

        }

        .risk-card input:checked + div{

            color:#B8860B;

        }

        .risk-card:has(input:checked){

            border-color:#FFC107;
            background:#FFF8E1;

        }

        .risk-name{

            font-weight:700;
            font-size:18px;
            margin-bottom:10px;

        }

        .risk-desc{

            font-size:13px;
            color:#666;
            line-height:20px;

        }

        button{

            margin-top:35px;

        }

        @media(max-width:768px){

            .grid{

                grid-template-columns:1fr;

            }

            .risk-options{

                grid-template-columns:1fr;

            }

            .card{

                width:95%;

            }

        }

    </style>

</head>

<body>

<div class="card">

<div class="step">

Step 2 of 3

</div>

<h2>

Financial Profile

</h2>

<p class="subtitle">

Tell us about your finances so we can build a personalised investment strategy.

</p>

<form method="POST">

<div class="grid">

<div class="field">

<label>Monthly Income</label>

<input
type="number"
name="income"
placeholder="50000"
required>

</div>

<div class="field">

<label>Monthly Expenses</label>

<input
type="number"
name="expense"
placeholder="25000"
required>

</div>

</div>

<div class="risk-title">

Choose Your Investment Style

</div>

<div class="risk-options">

<label class="risk-card">

<input type="radio" name="risk" value="low" required>

<div>

<div class="risk-name">

🛡 Conservative

</div>

<div class="risk-desc">

Lower risk with stable long-term growth.

</div>

</div>

</label>

<label class="risk-card">

<input type="radio" name="risk" value="medium">

<div>

<div class="risk-name">

⚖ Balanced

</div>

<div class="risk-desc">

Balanced mix of growth and stability.

</div>

</div>

</label>

<label class="risk-card">

<input type="radio" name="risk" value="high">

<div>

<div class="risk-name">

🚀 Aggressive

</div>

<div class="risk-desc">

Maximum growth potential with higher risk.

</div>

</div>

</label>

</div>

<button type="submit">

Generate My Investment Plan →

</button>

</form>

</div>

</body>

</html>
