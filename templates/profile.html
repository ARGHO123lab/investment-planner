<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

<link rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{ url_for('static', filename='icons/favicon-32x32.png') }}">

<link rel="icon"
      type="image/png"
      sizes="16x16"
      href="{{ url_for('static', filename='icons/favicon-16x16.png') }}">

<link rel="apple-touch-icon"
      href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">

<link rel="manifest"
      href="{{ url_for('static', filename='icons/site.webmanifest') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Financial Profile | SmartPlan Finance</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PFM7XZ5E3P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PFM7XZ5E3P');
    </script>

    <style>

       body{

margin:0;
min-height:100vh;

font-family:'Poppins',sans-serif;

background:linear-gradient(135deg,#FFFDF7,#FFF5DB);

display:flex;
justify-content:center;
align-items:center;

padding:40px;

}

.card{

width:100%;
max-width:850px;

background:white;

padding:50px;

border-radius:28px;

box-shadow:0 20px 45px rgba(0,0,0,.08);

}

.step{

display:inline-block;

background:#FFF4CF;

color:#B8860B;

padding:8px 18px;

border-radius:30px;

font-weight:600;

margin-bottom:20px;

}

h2{

font-size:36px;

margin-bottom:12px;

color:#333;

}

.subtitle{

font-size:18px;

line-height:30px;

color:#666;

margin-bottom:40px;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:30px;

}

.field{

display:flex;

flex-direction:column;

}

label{

font-weight:600;

margin-bottom:10px;

}

input{

padding:16px;

border-radius:14px;

border:1px solid #ddd;

font-size:17px;

transition:.25s;

}

input:focus{

outline:none;

border-color:#B8860B;

box-shadow:0 0 12px rgba(184,134,11,.15);

}

.risk-title{

margin-top:45px;

font-size:22px;

font-weight:700;

color:#B8860B;

margin-bottom:25px;

}

.risk-options{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:25px;

}

.risk-card{

background:white;

border:2px solid #ECECEC;

border-radius:20px;

padding:28px;

cursor:pointer;

transition:.3s;

text-align:center;

}

.risk-card:hover{

transform:translateY(-8px);

box-shadow:0 15px 30px rgba(0,0,0,.08);

border-color:#D9A600;

}

.risk-card input{

display:none;

}

.risk-card:has(input:checked){

background:#FFF7DF;

border-color:#B8860B;

box-shadow:0 12px 30px rgba(184,134,11,.15);

}

.risk-name{

font-size:20px;

font-weight:700;

margin-bottom:15px;

}

.risk-desc{

font-size:14px;

line-height:24px;

color:#666;

}

button{

margin-top:45px;

width:100%;

padding:18px;

font-size:18px;

font-weight:600;

background:#B8860B;

color:white;

border:none;

border-radius:14px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#9C7600;

transform:translateY(-2px);

}

.progress{

height:10px;

background:#EFEFEF;

border-radius:30px;

overflow:hidden;

margin-bottom:35px;

}

.progress span{

display:block;

height:100%;

width:66%;

background:linear-gradient(90deg,#D9A600,#F2C94C);

}

@media(max-width:900px){

.card{

padding:30px;

}

.grid{

grid-template-columns:1fr;

}

.risk-options{

grid-template-columns:1fr;

}

h2{

font-size:30px;

}

.subtitle{

font-size:16px;

line-height:28px;

}

}

    </style>

</head>

<body>

<div class="card">

<div class="step">

Step 2 of 3

</div>

<div class="progress">
<span></span>
</div>
<h2>

Financial Profile

</h2>

<p class="subtitle">

Tell us about your finances so we can build a personalised investment strategy.

</p>

<form method="POST">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<div class="grid">

<div class="field">

<label>Monthly Income</label>

<input
type="number"
name="income"
placeholder="50000"
required>

</div>

<div class="field">

<label>Monthly Expenses</label>

<input
type="number"
name="expense"
placeholder="25000"
required>

</div>

</div>

<div class="risk-title">

Choose Your Investment Style

</div>

<div class="risk-options">

<label class="risk-card">

<input type="radio" name="risk" value="low" required>

<div>

<div class="risk-name">

🛡 Conservative

</div>

<div class="risk-desc">

Lower risk with stable long-term growth.

</div>

</div>

</label>

<label class="risk-card">

<input type="radio" name="risk" value="medium">

<div>

<div class="risk-name">

⚖ Balanced

</div>

<div class="risk-desc">

Balanced mix of growth and stability.

</div>

</div>

</label>

<label class="risk-card">

<input type="radio" name="risk" value="high">

<div>

<div class="risk-name">

🚀 Aggressive

</div>

<div class="risk-desc">

Maximum growth potential with higher risk.

</div>

</div>

</label>

</div>

<button type="submit">

Generate My Investment Plan →

</button>

</form>

</div>

</body>

</html>
