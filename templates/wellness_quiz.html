<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='icons/site.webmanifest') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Money IQ Quiz | SmartPlan Finance</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0; min-height:100vh; font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#FFFDF7,#FFF6DD);
            display:flex; justify-content:center; align-items:center; padding:25px;
        }
        .card{
            background:white; width:100%; max-width:640px; padding:45px;
            border-radius:24px; box-shadow:0 18px 45px rgba(0,0,0,.08); box-sizing:border-box;
        }
        .progress{ text-align:center; color:#B8860B; font-weight:600; margin-bottom:10px; }
        h2{ text-align:center; margin-bottom:30px; color:#333; }
        .question-block{
            margin-bottom:28px; padding-bottom:24px; border-bottom:1px solid #f1e2b6;
        }
        .question-block:last-of-type{ border-bottom:none; }
        .q-text{ font-weight:600; margin-bottom:14px; color:#333; font-size:16px; }
        .option{
            display:block; padding:12px 16px; margin-bottom:8px; border-radius:10px;
            border:1px solid #eee; cursor:pointer; transition:.2s;
        }
        .option:hover{ border-color:#B8860B; background:#FFFDF5; }
        .option input{ margin-right:10px; }
        button{
            margin-top:15px; width:100%; padding:16px; border:none; border-radius:12px;
            background:#B8860B; color:white; font-size:18px; font-weight:600;
            cursor:pointer; transition:.3s;
        }
        button:hover{ background:#9F7600; }
    </style>
</head>

<body>

<div class="card">

    <div class="progress">Step 2 of 2 — Money IQ Quiz</div>
    <h2>🧠 Test Your Financial Knowledge</h2>

    <form method="POST">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        {% for q in questions %}
        <div class="question-block">
            <div class="q-text">{{ loop.index }}. {{ q.question }}</div>

            {% for option in q.options %}
            <label class="option">
                <input type="radio" name="{{ q.id }}" value="{{ option }}" required>
                {{ option }}
            </label>
            {% endfor %}
        </div>
        {% endfor %}

        <button type="submit">See My Results →</button>

    </form>

</div>

</body>
</html>
