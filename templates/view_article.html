<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ article.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>{{ article.title }}</h1>
        <p><small>Published on: {{ article.created_at }}</small></p>
        <hr>
        <div class="article-content">
            {{ article.content }}
        </div>
        <br>
        <a href="{{ url_for('articles') }}">Back to Blog</a>
    </div>
</body>
</html>
<form action="{{ url_for('delete_article', article_id=article.id) }}" 
      method="POST" 
      onsubmit="return confirm('Are you sure you want to delete this article?');">
    <button type="submit" style="background-color: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
        Delete Article
    </button>
</form>
