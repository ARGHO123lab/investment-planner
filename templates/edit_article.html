<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Article | SmartPlan Finance</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        body{
            margin:0;
            background:#f5f5f5;
            font-family:Poppins,sans-serif;
        }

        .container{

            max-width:1100px;
            margin:40px auto;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);

        }

        h1{

            color:#B8860B;
            margin-bottom:30px;

        }

        label{

            display:block;
            margin-top:20px;
            margin-bottom:8px;
            font-weight:600;

        }

        input[type=text]{

            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;

        }

        textarea{

            width:100%;
            height:700px;

        }

        .btn{

            margin-top:30px;
            background:#198754;
            color:white;
            border:none;
            padding:14px 30px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;

        }

        .btn:hover{

            background:#157347;

        }

        .back{

            display:inline-block;
            margin-left:15px;
            color:#B8860B;
            text-decoration:none;
            font-weight:600;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>✏️ Edit Article</h1>

    <form method="POST">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label>Article Title</label>

        <input
            type="text"
            name="title"
            value="{{ article.title }}"
            required
        >

        <label>Meta Description</label>

        <input
            type="text"
            name="meta_description"
            value="{{ article.meta_description }}"
        >

        <label>Article Content</label>

        <textarea
            id="content"
            name="content">{{ article.content }}</textarea>

        <button class="btn" type="submit">

            💾 Save Changes

        </button>

        <a
            class="back"
            href="{{ url_for('view_article', slug=article.slug) }}">

            ← Back to Article

        </a>

    </form>

</div>

<script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>

<script>

CKEDITOR.replace("content",{

    height:650

});

</script>

</body>
</html>
