<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | SmartPlan Finance</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PFM7XZ5E3P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PFM7XZ5E3P');
    </script>

    <style>

        body{

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

            padding:30px;

        }

        .card{

            width:480px;

            padding:40px;

        }

        .logo{

            text-align:center;

            font-size:55px;

            margin-bottom:10px;

        }

        h2{

            text-align:center;

            margin-bottom:10px;

        }

        .subtitle{

            text-align:center;

            color:#666;

            margin-bottom:30px;

            font-size:15px;

        }

        label{

            display:block;

            margin-bottom:8px;

            margin-top:18px;

            font-weight:600;

        }

        .security{

            margin-top:25px;

            background:#FFF8E1;

            border-left:5px solid #FFC107;

            padding:15px;

            border-radius:12px;

            font-size:14px;

            color:#555;

        }

        .security strong{

            color:#B8860B;

        }

    </style>

</head>

<body>

<div class="card">

<div class="logo">🔐</div>

<h2>Welcome Back</h2>

<p class="subtitle">

Enter your details to generate your personalised investment plan.

</p>

<form method="POST">

<label>Full Name</label>

<input
type="text"
name="name"
placeholder="John Doe"
required>

<label>Mobile Number</label>

<input
type="text"
name="mobile"
placeholder="+91 9876543210"
maxlength="15"
required>

<label>Select Country</label>

<select name="country" required>

<option value="">Choose your country</option>

{% for country in countries %}

<option value="{{ country }}">

{{ country }}

</option>

{% endfor %}

</select>

<button type="submit">

Continue →

</button>

</form>

<div class="security">

<strong>🔒 Privacy First</strong><br><br>

Your information is used only to generate your personalised financial report.
We never sell or share your personal information.

</div>

</div>

</body>

</html>
