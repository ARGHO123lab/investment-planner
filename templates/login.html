<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Investment Planner - Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#fff8f2,#f8fbff);
            padding:30px;

        }

        .card{

            width:500px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 12px 35px rgba(0,0,0,.10);

        }

        .logo{

            font-size:34px;
            text-align:center;
            margin-bottom:10px;

        }

        h2{

            text-align:center;
            color:#ff6b00;
            margin-bottom:10px;

        }

        .subtitle{

            text-align:center;
            color:#666;
            margin-bottom:30px;

        }

        .form-group{

            margin-bottom:20px;

        }

        label{

            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#444;

        }

        input,
        select{

            width:100%;
            padding:14px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:15px;
            transition:.3s;

        }

        input:focus,
        select:focus{

            outline:none;
            border-color:#ff6b00;

        }

        button{

            width:100%;
            padding:15px;
            margin-top:15px;
            background:#ff6b00;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;

        }

        button:hover{

            background:#e65c00;

        }

        .footer{

            margin-top:25px;
            text-align:center;
            color:#888;
            font-size:13px;

        }

    </style>

</head>

<body>

<div class="card">

    <div class="logo">

        💰

    </div>

    <h2>

        Investment Planner

    </h2>

    <div class="subtitle">

        Enter your details to begin your personalized investment journey.

    </div>

    <form method="POST">

        <div class="form-group">

            <label>Full Name</label>

            <input
                type="text"
                name="name"
                placeholder="Enter your full name"
                required>

        </div>

        <div class="form-group">

            <label>Mobile Number</label>

            <input
                type="text"
                name="mobile"
                maxlength="15"
                placeholder="Enter your mobile number"
                required>

        </div>

        <div class="form-group">

            <label>Country</label>

            <select name="country" required>

                {% for country in countries %}

                <option value="{{ country }}">

                    {{ country }}

                </option>

                {% endfor %}

            </select>

        </div>

        <button type="submit">

            Continue →

        </button>

    </form>

    <div class="footer">

        Secure • Personalized • Multi-Country

    </div>

</div>

</body>

</html>
