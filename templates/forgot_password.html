<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | SmartPlan Finance</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #FFFDF7, #FFF6DD);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 460px;
            padding: 45px;
            border-radius: 24px;
            box-shadow: 0 18px 45px rgba(0,0,0,.08);
            box-sizing: border-box;
        }

        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 8px;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            line-height: 26px;
            font-size: 15px;
        }

        .error-box {
            background: #FFF0F0;
            border-left: 5px solid #D33;
            color: #B00020;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14.5px;
            line-height: 22px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 20px 0 8px;
            font-size: 14.5px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 16px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #B8860B;
            box-shadow: 0 0 10px rgba(184,134,11,.15);
        }

        .hint {
            font-size: 13px;
            color: #999;
            margin-top: 6px;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #B8860B;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #9F7600;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #B8860B;
            text-decoration: none;
            font-size: 14.5px;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {

            .card {
                padding: 30px 24px;
                border-radius: 18px;
            }

            .logo {
                font-size: 40px;
            }

            h2 {
                font-size: 22px;
            }

            input, button {
                font-size: 16px; /* keeps mobile browsers from auto-zooming on focus */
            }

        }

    </style>

</head>
<body>

<div class="card">

    <div class="logo">🔑</div>

    <h2>Reset Your Password</h2>

    <p class="subtitle">
        Enter your mobile number and answer your security question to set a new password.
    </p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label>Mobile Number</label>
        <input
            type="text"
            name="mobile"
            placeholder="+91 9876543210"
            maxlength="15"
            required>

        <label>Security Question Answer</label>
        <input
            type="text"
            name="security_answer"
            placeholder="Your answer"
            required>
        <div class="hint">Answer to the security question you chose at signup.</div>

        <label>New Password</label>
        <input
            type="password"
            name="new_password"
            placeholder="At least 6 characters"
            minlength="6"
            required>

        <button type="submit">Reset Password</button>
    </form>

    <a href="{{ url_for('login') }}" class="back-link">← Back to Login</a>

</div>

</body>
</html>
